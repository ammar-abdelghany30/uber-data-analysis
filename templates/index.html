<!DOCTYPE html>
<html>
<head>
    <title>Uber Fare Predictor</title>
</head>
<body>
    <h1>Predict Your Uber Fare</h1>

    {% if errors %}
        <div style="color: red;">
            <ul>
            {% for error in errors %}
                <li>{{ error }}</li>
            {% endfor %}
            </ul>
        </div>
    {% endif %}

    <form action="/predict" method="POST">
        <label for="distance">Trip Distance (km):</label>
        <input type="number" step="0.01" name="distance" id="distance" required><br><br>

        <label for="jfk_dist">Distance to JFK (km):</label>
        <input type="number" step="0.01" name="jfk_dist" id="jfk_dist" required><br><br>

        <label for="lga_dist">Distance to LGA (km):</label>
        <input type="number" step="0.01" name="lga_dist" id="lga_dist" required><br><br>

        <label for="ewr_dist">Distance to EWR (km):</label>
        <input type="number" step="0.01" name="ewr_dist" id="ewr_dist" required><br><br>

        <label for="nyc_dist">Distance to NYC Center (km):</label>
        <input type="number" step="0.01" name="nyc_dist" id="nyc_dist" required><br><br>

        <label for="year">Year of Trip:</label>
        <input type="number" name="year" id="year" min="2009" max="2025" required><br><br>

        <button type="submit">Predict Fare</button>
    </form>
</body>
</html>
